name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build Windows executable
        run: uv run pyinstaller build/video_summarizer.spec --noconfirm

      - name: Package release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $source = "dist/video-lesson-summarizer"
          $archive = "dist/video-lesson-summarizer-windows-x64-$version.zip"
          if (-not (Test-Path $source)) {
            throw "Expected build output at $source"
          }
          Compress-Archive -Path $source -DestinationPath $archive -Force
          "ARCHIVE_PATH=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ${{ env.ARCHIVE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
