services:
  video-summarizer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: video-summarizer:cuda
    env_file:
      - ../.env
    environment:
      WHISPER_DEVICE: cuda
      OUTPUT_DIR: /output
    volumes:
      - ../data:/data:ro
      - ../output:/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
